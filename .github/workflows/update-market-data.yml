name: Update Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 9 * * 1-5"

permissions:
  contents: write

jobs:
  update-taiex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh cached TAIEX data
        run: python .github/scripts/update_taiex.py

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/taiex.json data/0050.json data/2330.json
          git diff --cached --quiet && exit 0
          git commit -m "Update cached market data"
          git push
